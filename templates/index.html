<!DOCTYPE html>
<html>
<head>
    <title>Flood Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
</head>

<body>

<div class="container">

    <h1>Flood Prediction System</h1>

    <form action="/predict" method="POST">

        <label>Temperature</label>
        <input type="number" step="any" name="temp" required>

        <label>Humidity</label>
        <input type="number" step="any" name="humidity" required>

        <label>Cloud Cover</label>
        <input type="number" step="any" name="cloud" required>

        <label>Annual Rainfall</label>
        <input type="number" step="any" name="annual" required>

        <label>Jan-Feb Rainfall</label>
        <input type="number" step="any" name="janfeb" required>

        <label>Mar-May Rainfall</label>
        <input type="number" step="any" name="marmay" required>

        <label>Jun-Sep Rainfall</label>
        <input type="number" step="any" name="junsep" required>

        <label>Oct-Dec Rainfall</label>
        <input type="number" step="any" name="octdec" required>

        <label>Average June Rainfall</label>
        <input type="number" step="any" name="avgjune" required>

        <label>Sub Rainfall</label>
        <input type="number" step="any" name="sub" required>

        <br><br>

        <button type="submit">Predict Flood</button>

    </form>

</div>

</body>
</html>
